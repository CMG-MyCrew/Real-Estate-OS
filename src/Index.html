<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f6f8fb;
        color: #1f2937;
      }
      .shell {
        padding: 24px;
      }
      .card {
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        padding: 24px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }
      .muted {
        color: #6b7280;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 16px;
        margin-top: 24px;
      }
      .module {
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 16px;
        background: #f9fafb;
      }
      .status {
        display: inline-block;
        margin-top: 8px;
        font-size: 12px;
        font-weight: 700;
        color: #065f46;
        background: #d1fae5;
        border-radius: 999px;
        padding: 4px 10px;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <h1>REOS Enterprise</h1>
        <div class="muted">Core Framework v3.0.0</div>
        <div class="grid">
          <div class="module"><strong>CRM</strong><br><span class="status">Framework Ready</span></div>
          <div class="module"><strong>Acquisitions</strong><br><span class="status">Planned</span></div>
          <div class="module"><strong>Properties</strong><br><span class="status">Planned</span></div>
          <div class="module"><strong>Vendors</strong><br><span class="status">Planned</span></div>
          <div class="module"><strong>Automation</strong><br><span class="status">Planned</span></div>
          <div class="module"><strong>AI Agents</strong><br><span class="status">Planned</span></div>
        </div>
      </section>
    </main>
  </body>
</html>
