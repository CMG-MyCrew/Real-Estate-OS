<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      body { margin: 0; font-family: Arial, sans-serif; background: #f6f8fb; color: #1f2937; }
      .shell { padding: 24px; }
      .header { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; margin-bottom: 20px; }
      .card { background: #ffffff; border: 1px solid #e5e7eb; border-radius: 14px; padding: 24px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08); }
      h1 { margin: 0 0 8px; font-size: 28px; }
      h2 { margin: 0 0 12px; font-size: 18px; }
      .muted { color: #6b7280; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 16px; margin-top: 20px; }
      .module { border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; background: #f9fafb; cursor: pointer; transition: transform 120ms ease, box-shadow 120ms ease; }
      .module:hover { transform: translateY(-1px); box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08); }
      .status { display: inline-block; margin-top: 8px; font-size: 12px; font-weight: 700; color: #065f46; background: #d1fae5; border-radius: 999px; padding: 4px 10px; }
      .toolbar { display: flex; gap: 8px; flex-wrap: wrap; }
      button { border: 0; border-radius: 8px; padding: 10px 14px; font-weight: 700; cursor: pointer; }
      .primary { background: #111827; color: #fff; }
      .secondary { background: #e5e7eb; color: #111827; }
      .panel { margin-top: 20px; }
      .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-top: 16px; }
      .kpi { border: 1px solid #e5e7eb; border-radius: 12px; padding: 14px; background: #f9fafb; }
      .kpi strong { display: block; font-size: 26px; margin-top: 4px; }
      .records { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td { text-align: left; border-bottom: 1px solid #e5e7eb; padding: 8px; vertical-align: top; }
      th { color: #374151; background: #f9fafb; }
      input { padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; min-width: 260px; }
      pre { white-space: pre-wrap; background: #0f172a; color: #e5e7eb; border-radius: 12px; padding: 16px; overflow: auto; max-height: 220px; }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <div class="header">
          <div>
            <h1>REOS Enterprise</h1>
            <div class="muted">Command Center · Core Framework v3.0.0</div>
          </div>
          <div class="toolbar">
            <button class="secondary" onclick="loadNavigation()">Refresh Navigation</button>
            <button class="secondary" onclick="loadDashboardRecords()">Refresh Records</button>
            <button class="secondary" onclick="runHealthCheck()">Health Check</button>
            <button class="primary" onclick="initializeWorkbook()">Initialize Workbook</button>
          </div>
        </div>

        <h2>Modules</h2>
        <div id="modules" class="grid">
          <div class="module"><strong>Loading modules...</strong><br><span class="status">Please wait</span></div>
        </div>

        <div class="panel">
          <h2>Records Review</h2>
          <div class="toolbar">
            <input id="recordSearch" placeholder="Search clients and acquisition leads">
            <button class="primary" onclick="searchRecords()">Search Records</button>
          </div>
          <div class="kpis">
            <div class="kpi"><span>Clients</span><strong id="kpiClients">0</strong></div>
            <div class="kpi"><span>Acquisition Leads</span><strong id="kpiLeads">0</strong></div>
            <div class="kpi"><span>Hot Leads</span><strong id="kpiHot">0</strong></div>
            <div class="kpi"><span>Follow-ups Due</span><strong id="kpiDue">0</strong></div>
            <div class="kpi"><span>Open Tasks</span><strong id="kpiTasks">0</strong></div>
          </div>
          <div class="records">
            <div>
              <h2>Recent Clients</h2>
              <table id="clientsTable"></table>
            </div>
            <div>
              <h2>Recent Acquisition Leads</h2>
              <table id="leadsTable"></table>
            </div>
          </div>
        </div>

        <div class="panel">
          <h2>System Output</h2>
          <pre id="output">Ready.</pre>
        </div>
      </section>
    </main>

    <script>
      function output(value) {
        document.getElementById('output').textContent = typeof value === 'string' ? value : JSON.stringify(value, null, 2);
      }

      function renderModules(modules) {
        const container = document.getElementById('modules');
        container.innerHTML = '';
        if (!modules || !modules.length) {
          container.innerHTML = '<div class="module"><strong>No modules available</strong><br><span class="status">Check permissions</span></div>';
          return;
        }

        modules.forEach(function(module) {
          const el = document.createElement('div');
          el.className = 'module';
          el.onclick = function() { openModule(module.key); };
          el.innerHTML = '<strong>' + escapeHtml(module.name) + '</strong><br>' +
            '<span class="muted">' + escapeHtml(module.description || '') + '</span><br>' +
            '<span class="status">Available</span>';
          container.appendChild(el);
        });
      }

      function renderDashboard(data) {
        document.getElementById('kpiClients').textContent = data.kpis.clients || 0;
        document.getElementById('kpiLeads').textContent = data.kpis.acquisitionLeads || 0;
        document.getElementById('kpiHot').textContent = data.kpis.hotAcquisitionLeads || 0;
        document.getElementById('kpiDue').textContent = data.kpis.followUpsDue || 0;
        document.getElementById('kpiTasks').textContent = data.kpis.openTasks || 0;
        renderClients(data.crm.recentClients || []);
        renderLeads(data.acquisitions.recentLeads || []);
        output({ dashboard: data });
      }

      function renderClients(records) {
        renderTable('clientsTable', ['Client ID', 'First Name', 'Last Name', 'Email', 'Phone', 'Status'], records);
      }

      function renderLeads(records) {
        renderTable('leadsTable', ['Lead ID', 'Property Address', 'Owner Name', 'Status', 'Priority', 'Distress Indicator'], records);
      }

      function renderTable(id, columns, records) {
        const table = document.getElementById(id);
        let html = '<tr>' + columns.map(function(col) { return '<th>' + escapeHtml(col) + '</th>'; }).join('') + '</tr>';
        if (!records.length) {
          html += '<tr><td colspan="' + columns.length + '">No records found.</td></tr>';
        } else {
          records.forEach(function(record) {
            html += '<tr>' + columns.map(function(col) { return '<td>' + escapeHtml(record[col] || '') + '</td>'; }).join('') + '</tr>';
          });
        }
        table.innerHTML = html;
      }

      function loadNavigation() {
        google.script.run
          .withSuccessHandler(function(nav) { renderModules(nav); output({ navigation: nav }); })
          .withFailureHandler(function(error) { output({ error: error.message }); })
          .reosGetNavigation();
      }

      function loadDashboardRecords() {
        google.script.run
          .withSuccessHandler(renderDashboard)
          .withFailureHandler(function(error) { output({ error: error.message }); })
          .reosDashboardOverview();
      }

      function searchRecords() {
        google.script.run
          .withSuccessHandler(function(data) {
            renderClients(data.clients || []);
            renderLeads(data.acquisitionLeads || []);
            output(data);
          })
          .withFailureHandler(function(error) { output({ error: error.message }); })
          .reosDashboardSearch(document.getElementById('recordSearch').value);
      }

      function openModule(key) {
        const route = key === 'crm' ? 'crm.open' : key === 'leads' ? 'acquisitions.open' : key === 'tasks' ? 'tasks.open' : key === 'admin' ? 'admin.health' : 'home.open';
        google.script.run
          .withSuccessHandler(output)
          .withFailureHandler(function(error) { output({ error: error.message }); })
          .reosDispatch(route, {});
      }

      function runHealthCheck() {
        google.script.run
          .withSuccessHandler(output)
          .withFailureHandler(function(error) { output({ error: error.message }); })
          .reosDispatch('admin.health', {});
      }

      function initializeWorkbook() {
        google.script.run
          .withSuccessHandler(output)
          .withFailureHandler(function(error) { output({ error: error.message }); })
          .reosDispatch('admin.setup', {});
      }

      function escapeHtml(value) {
        return String(value || '').replace(/[&<>'"]/g, function(char) {
          return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' })[char];
        });
      }

      loadNavigation();
      loadDashboardRecords();
    </script>
  </body>
</html>
