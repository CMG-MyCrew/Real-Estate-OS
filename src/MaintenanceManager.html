<!DOCTYPE html>
<html>
  <head>
    <base target="_top"><meta charset="utf-8">
    <style>
      body{margin:0;font-family:Arial,sans-serif;background:#f6f8fb;color:#1f2937}.shell{padding:22px}.header{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:16px}h1{margin:0 0 6px;font-size:26px}h2{margin:0 0 10px;font-size:17px}.muted{color:#6b7280}.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:end;margin-bottom:16px}label{font-size:12px;font-weight:700;color:#374151}input,select,textarea{padding:9px;border:1px solid #d1d5db;border-radius:8px}textarea{min-height:60px}button{padding:9px 12px;border:0;border-radius:8px;cursor:pointer;font-weight:700}.primary{background:#111827;color:#fff}.secondary{background:#e5e7eb;color:#111827}.success{background:#dcfce7;color:#166534}.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:15px;margin-bottom:16px;box-shadow:0 4px 14px rgba(15,23,42,.05)}.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:12px;margin-bottom:16px}.kpi{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px}.kpi span{color:#6b7280;font-size:12px;font-weight:700}.kpi strong{display:block;font-size:27px;margin-top:4px}.grid{display:grid;grid-template-columns:340px 1fr;gap:16px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{text-align:left;border-bottom:1px solid #e5e7eb;padding:8px;vertical-align:top}th{background:#f9fafb;color:#374151}pre{white-space:pre-wrap;background:#0f172a;color:#e5e7eb;border-radius:12px;padding:12px;max-height:260px;overflow:auto}
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="header"><div><h1>v3.0.1 Maintenance & Stabilization</h1><div class="muted">Bug fix tracker, patch release manager, regression log, hotfix approvals, and stabilization dashboard.</div></div><button class="secondary" onclick="loadDashboard()">Refresh</button></div>
      <section class="kpis"><div class="kpi"><span>Open Issues</span><strong id="kOpen">0</strong></div><div class="kpi"><span>Critical</span><strong id="kCritical">0</strong></div><div class="kpi"><span>High</span><strong id="kHigh">0</strong></div><div class="kpi"><span>Regression Runs</span><strong id="kRuns">0</strong></div><div class="kpi"><span>Patch Releases</span><strong id="kPatches">0</strong></div></section>
      <section class="grid">
        <div class="card"><h2>Create Patch Issue</h2><label>Title</label><input id="title" style="width:100%"><label>Module</label><input id="module" value="General" style="width:100%"><label>Severity</label><select id="severity" style="width:100%"><option>Critical</option><option>High</option><option selected>Medium</option><option>Low</option></select><label>Description</label><textarea id="description" style="width:100%"></textarea><button class="primary" onclick="createIssue()">Create Issue</button><hr><button class="success" onclick="runRegression()">Run Regression</button> <button class="secondary" onclick="createPatch()">Create Patch Release</button></div>
        <div class="card"><h2>Patch Issues</h2><table id="issuesTable"></table></div>
      </section>
      <section class="card"><h2>Regression Runs</h2><table id="runsTable"></table></section>
      <section class="card"><h2>Patch Releases</h2><table id="patchesTable"></table></section>
      <section class="card"><h2>System Output</h2><pre id="output">Ready.</pre></section>
    </main>
    <script>
      function loadDashboard(){google.script.run.withSuccessHandler(render).withFailureHandler(showError).reosMaintenanceDashboard();}
      function createIssue(){const r={Title:valueOf('title'),Module:valueOf('module'),Severity:valueOf('severity'),Description:valueOf('description')};google.script.run.withSuccessHandler(function(d){output(d);loadDashboard();}).withFailureHandler(showError).reosMaintenanceCreateIssue(r);}
      function closeIssue(id){google.script.run.withSuccessHandler(function(d){output(d);loadDashboard();}).withFailureHandler(showError).reosMaintenanceUpdateIssue(id,{Status:'Closed',Resolution:'Closed from maintenance UI'});}
      function runRegression(){google.script.run.withSuccessHandler(function(d){output(d);loadDashboard();}).withFailureHandler(showError).reosMaintenanceRunRegression('3.0.1');}
      function createPatch(){google.script.run.withSuccessHandler(function(d){output(d);loadDashboard();}).withFailureHandler(showError).reosMaintenanceCreatePatchRelease('3.0.1');}
      function render(data){const k=data.kpis||{};setText('kOpen',k.openIssues);setText('kCritical',k.critical);setText('kHigh',k.high);setText('kRuns',k.regressionRuns);setText('kPatches',k.patches);renderIssues(data.issues||[]);renderRuns(data.regressionRuns||[]);renderPatches(data.patches||[]);output(data);}
      function renderIssues(rows){let h='<tr><th>Title</th><th>Module</th><th>Severity</th><th>Status</th><th>Target</th><th>Action</th></tr>';if(!rows.length)h+='<tr><td colspan="6">No patch issues.</td></tr>';rows.forEach(r=>{h+='<tr><td>'+esc(r.Title)+'</td><td>'+esc(r.Module)+'</td><td>'+esc(r.Severity)+'</td><td>'+esc(r.Status)+'</td><td>'+esc(r['Target Version'])+'</td><td><button class="secondary" onclick="closeIssue(\''+escJs(r['Patch Issue ID'])+'\')">Close</button></td></tr>';});document.getElementById('issuesTable').innerHTML=h;}
      function renderRuns(rows){let h='<tr><th>Created</th><th>Version</th><th>Status</th><th>Passed</th><th>Failed</th><th>Warnings</th></tr>';if(!rows.length)h+='<tr><td colspan="6">No regression runs.</td></tr>';rows.forEach(r=>{h+='<tr><td>'+esc(r['Created At'])+'</td><td>'+esc(r.Version)+'</td><td>'+esc(r.Status)+'</td><td>'+esc(r.Passed)+'</td><td>'+esc(r.Failed)+'</td><td>'+esc(r.Warnings)+'</td></tr>';});document.getElementById('runsTable').innerHTML=h;}
      function renderPatches(rows){let h='<tr><th>Created</th><th>Version</th><th>Status</th><th>Critical</th><th>High</th><th>Regression</th></tr>';if(!rows.length)h+='<tr><td colspan="6">No patch releases.</td></tr>';rows.forEach(r=>{h+='<tr><td>'+esc(r['Created At'])+'</td><td>'+esc(r.Version)+'</td><td>'+esc(r.Status)+'</td><td>'+esc(r['Open Critical Issues'])+'</td><td>'+esc(r['Open High Issues'])+'</td><td>'+esc(r['Regression Status'])+'</td></tr>';});document.getElementById('patchesTable').innerHTML=h;}
      function output(v){document.getElementById('output').textContent=typeof v==='string'?v:JSON.stringify(v,null,2);}function showError(e){output({error:e.message});}function valueOf(id){const el=document.getElementById(id);return el?el.value:''}function setText(id,v){document.getElementById(id).textContent=v||0}function esc(v){return String(v==null?'':v).replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));}function escJs(v){return String(v||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
      loadDashboard();
    </script>
  </body>
</html>
