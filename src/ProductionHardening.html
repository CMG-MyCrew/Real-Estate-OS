<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <style>
      body { margin: 0; font-family: Arial, sans-serif; background: #f6f8fb; color: #1f2937; }
      .shell { padding: 22px; }
      .header { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; margin-bottom: 16px; }
      h1 { margin: 0 0 6px; font-size: 26px; }
      h2 { margin: 0 0 10px; font-size: 17px; }
      .muted { color: #6b7280; }
      .toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: end; margin-bottom: 16px; }
      button { padding: 9px 12px; border: 0; border-radius: 8px; cursor: pointer; font-weight: 700; }
      input { padding: 9px; border: 1px solid #d1d5db; border-radius: 8px; width: 120px; }
      .primary { background: #111827; color: #fff; }
      .secondary { background: #e5e7eb; color: #111827; }
      .success { background: #dcfce7; color: #166534; }
      .warning { background: #fef3c7; color: #92400e; }
      .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 15px; margin-bottom: 16px; box-shadow: 0 4px 14px rgba(15, 23, 42, 0.05); }
      .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(145px, 1fr)); gap: 12px; margin-bottom: 16px; }
      .kpi { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 14px; }
      .kpi span { color: #6b7280; font-size: 12px; font-weight: 700; }
      .kpi strong { display: block; font-size: 27px; margin-top: 4px; }
      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td { text-align: left; border-bottom: 1px solid #e5e7eb; padding: 8px; vertical-align: top; }
      th { background: #f9fafb; color: #374151; }
      .pill { display: inline-block; border-radius: 999px; padding: 3px 8px; font-size: 12px; font-weight: 700; }
      .pass { background: #dcfce7; color: #166534; }
      .warn { background: #fef3c7; color: #92400e; }
      .fail { background: #fee2e2; color: #991b1b; }
      pre { white-space: pre-wrap; background: #0f172a; color: #e5e7eb; border-radius: 12px; padding: 12px; max-height: 260px; overflow: auto; }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="header">
        <div>
          <h1>Production Hardening</h1>
          <div class="muted">Release readiness, performance checks, trigger audit, secrets review, automation validation, and deployment gate.</div>
        </div>
        <button class="secondary" onclick="loadLatest()">Refresh Latest</button>
      </div>

      <div class="toolbar">
        <button class="primary" onclick="runAudit()">Run Readiness Audit</button>
        <button class="secondary" onclick="clearCaches()">Clear Dashboard Cache</button>
        <input id="daysToKeep" type="number" value="90">
        <button class="warning" onclick="cleanupLogs()">Review Log Cleanup</button>
      </div>

      <section class="kpis">
        <div class="kpi"><span>Status</span><strong id="status">-</strong></div>
        <div class="kpi"><span>Score</span><strong id="score">0</strong></div>
        <div class="kpi"><span>Critical</span><strong id="critical">0</strong></div>
        <div class="kpi"><span>Warnings</span><strong id="warnings">0</strong></div>
        <div class="kpi"><span>Passed</span><strong id="passed">0</strong></div>
      </section>

      <section class="card"><h2>Readiness Checks</h2><table id="checksTable"></table></section>
      <section class="card"><h2>System Output</h2><pre id="output">Ready.</pre></section>
    </main>

    <script>
      function runAudit() { google.script.run.withSuccessHandler(renderAudit).withFailureHandler(showError).reosProductionRunReadinessAudit({}); }
      function loadLatest() { google.script.run.withSuccessHandler(function(report) { output(report || { message: 'No hardening report found.' }); if (report && report['Summary JSON']) renderAudit(JSON.parse(report['Summary JSON'])); }).withFailureHandler(showError).reosProductionGetLatestReport(); }
      function clearCaches() { google.script.run.withSuccessHandler(output).withFailureHandler(showError).reosProductionClearDashboardCaches(); }
      function cleanupLogs() { google.script.run.withSuccessHandler(output).withFailureHandler(showError).reosProductionCleanupLogs(Number(document.getElementById('daysToKeep').value || 90)); }
      function renderAudit(data) {
        setText('status', data.status || '-'); setText('score', data.score || 0); setText('critical', data.criticalIssues || 0); setText('warnings', data.warnings || 0); setText('passed', data.checksPassed || 0);
        renderChecks(data.checks || []); output(data);
      }
      function renderChecks(rows) {
        let html = '<tr><th>Area</th><th>Check</th><th>Status</th><th>Severity</th><th>Message</th></tr>';
        if (!rows.length) html += '<tr><td colspan="5">Run an audit to see checks.</td></tr>';
        rows.forEach(function(row) { const cls = String(row.Status || '').toLowerCase(); html += '<tr><td>' + esc(row.Area) + '</td><td>' + esc(row.Name) + '</td><td><span class="pill ' + esc(cls) + '">' + esc(row.Status) + '</span></td><td>' + esc(row.Severity) + '</td><td>' + esc(row.Message) + '</td></tr>'; });
        document.getElementById('checksTable').innerHTML = html;
      }
      function output(value) { document.getElementById('output').textContent = typeof value === 'string' ? value : JSON.stringify(value, null, 2); }
      function showError(error) { output({ error: error.message }); }
      function setText(id, value) { document.getElementById(id).textContent = value; }
      function esc(value) { return String(value === null || value === undefined ? '' : value).replace(/[&<>'"]/g, function(ch) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' })[ch]; }); }
      loadLatest();
    </script>
  </body>
</html>
