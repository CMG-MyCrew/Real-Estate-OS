<!DOCTYPE html><html><head><base target="_top"><meta charset="utf-8"><style>body{margin:0;font-family:Arial,sans-serif;background:#f6f8fb;color:#1f2937}.shell{padding:22px}.header{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:16px}h1{margin:0 0 6px;font-size:26px}h2{margin:0 0 10px;font-size:17px}.muted{color:#6b7280}.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:end;margin-bottom:16px}input,select{padding:9px;border:1px solid #d1d5db;border-radius:8px}button{padding:9px 12px;border:0;border-radius:8px;cursor:pointer;font-weight:700}.primary{background:#111827;color:#fff}.secondary{background:#e5e7eb;color:#111827}.success{background:#dcfce7;color:#166534}.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:15px;margin-bottom:16px;box-shadow:0 4px 14px rgba(15,23,42,.05)}.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:12px;margin-bottom:16px}.kpi{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px}.kpi span{color:#6b7280;font-size:12px;font-weight:700}.kpi strong{display:block;font-size:27px;margin-top:4px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{text-align:left;border-bottom:1px solid #e5e7eb;padding:8px;vertical-align:top}th{background:#f9fafb;color:#374151}pre{white-space:pre-wrap;background:#0f172a;color:#e5e7eb;border-radius:12px;padding:12px;max-height:220px;overflow:auto}</style></head><body><main class="shell"><div class="header"><div><h1>Release Center</h1><div class="muted">Build, validate, approve, backup, and record REOS release candidates.</div></div><button class="secondary" onclick="loadDashboard()">Refresh</button></div><div class="toolbar"><input id="version" placeholder="Version, e.g. 3.0.0-RC1"><button class="primary" onclick="buildRC()">Build Release Candidate</button><input id="releaseId" placeholder="Release ID"><button class="success" onclick="approveRC()">Approve</button><select id="environment"><option>Development</option><option>Test</option><option>Staging</option><option>Production</option></select><button class="secondary" onclick="recordDeployment()">Record Deployment</button></div><section class="kpis"><div class="kpi"><span>Releases</span><strong id="kReleases">0</strong></div><div class="kpi"><span>Deployments</span><strong id="kDeployments">0</strong></div><div class="kpi"><span>Backups</span><strong id="kBackups">0</strong></div><div class="kpi"><span>Environment</span><strong id="kEnv">-</strong></div></section><section class="card"><h2>Release Candidates</h2><table id="releasesTable"></table></section><section class="card"><h2>Deployments</h2><table id="deploymentsTable"></table></section><section class="card"><h2>Backups</h2><table id="backupsTable"></table></section><section class="card"><h2>System Output</h2><pre id="output">Ready.</pre></section></main><script>function loadDashboard(){google.script.run.withSuccessHandler(render).withFailureHandler(showError).reosReleaseCenterDashboard()}function render(d){setText('kReleases',(d.releases||[]).length);setText('kDeployments',(d.deployments||[]).length);setText('kBackups',(d.backups||[]).length);setText('kEnv',d.currentEnvironment?d.currentEnvironment.Name:'-');renderReleases(d.releases||[]);renderDeployments(d.deployments||[]);renderBackups(d.backups||[]);output(d)}function renderReleases(rows){let h='<tr><th>ID</th><th>Version</th><th>Status</th><th>Score</th><th>Backup</th><th>Created</th></tr>';if(!rows.length)h+='<tr><td colspan="6">No releases yet.</td></tr>';rows.forEach(r=>h+='<tr onclick="pick(\''+escJs(r['Release ID'])+'\')"><td>'+esc(r['Release ID'])+'</td><td>'+esc(r.Version)+'</td><td>'+esc(r.Status)+'</td><td>'+esc(r['Readiness Score'])+'</td><td>'+esc(r['Backup ID'])+'</td><td>'+esc(r['Created At'])+'</td></tr>');document.getElementById('releasesTable').innerHTML=h}function renderDeployments(rows){let h='<tr><th>ID</th><th>Release</th><th>Version</th><th>Environment</th><th>Status</th><th>Started</th></tr>';if(!rows.length)h+='<tr><td colspan="6">No deployments yet.</td></tr>';rows.forEach(r=>h+='<tr><td>'+esc(r['Deployment ID'])+'</td><td>'+esc(r['Release ID'])+'</td><td>'+esc(r.Version)+'</td><td>'+esc(r.Environment)+'</td><td>'+esc(r.Status)+'</td><td>'+esc(r['Started At'])+'</td></tr>');document.getElementById('deploymentsTable').innerHTML=h}function renderBackups(rows){let h='<tr><th>ID</th><th>Type</th><th>Status</th><th>Open</th><th>Created</th></tr>';if(!rows.length)h+='<tr><td colspan="5">No backups yet.</td></tr>';rows.forEach(r=>h+='<tr><td>'+esc(r['Backup ID'])+'</td><td>'+esc(r.Type)+'</td><td>'+esc(r.Status)+'</td><td>'+(r['Backup URL']?'<a href="'+esc(r['Backup URL'])+'" target="_blank">Open</a>':'')+'</td><td>'+esc(r['Created At'])+'</td></tr>');document.getElementById('backupsTable').innerHTML=h}function pick(id){document.getElementById('releaseId').value=id}function buildRC(){google.script.run.withSuccessHandler(x=>{output(x);loadDashboard()}).withFailureHandler(showError).reosReleaseCenterBuild({version:document.getElementById('version').value})}function approveRC(){google.script.run.withSuccessHandler(x=>{output(x);loadDashboard()}).withFailureHandler(showError).reosReleaseCenterApprove(document.getElementById('releaseId').value)}function recordDeployment(){google.script.run.withSuccessHandler(x=>{output(x);loadDashboard()}).withFailureHandler(showError).reosReleaseCenterRecordDeployment(document.getElementById('releaseId').value,document.getElementById('environment').value,'Recorded from Release Center')}function output(v){document.getElementById('output').textContent=typeof v==='string'?v:JSON.stringify(v,null,2)}function showError(e){output({error:e.message})}function setText(id,v){document.getElementById(id).textContent=v||0}function esc(v){return String(v==null?'':v).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}function escJs(v){return String(v||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'")}loadDashboard()</script></body></html>
