<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <style>
      body { margin:0; font-family:Arial,sans-serif; background:#f6f8fb; color:#1f2937; }
      .shell { padding:22px; }
      .header { display:flex; justify-content:space-between; gap:16px; align-items:flex-start; margin-bottom:16px; }
      h1 { margin:0 0 6px; font-size:26px; } h2 { margin:0 0 10px; font-size:17px; }
      .muted { color:#6b7280; }
      .toolbar { display:flex; flex-wrap:wrap; gap:8px; align-items:end; margin-bottom:16px; }
      label { font-size:12px; font-weight:700; color:#374151; }
      select { padding:9px; border:1px solid #d1d5db; border-radius:8px; }
      button { padding:9px 12px; border:0; border-radius:8px; cursor:pointer; font-weight:700; }
      .primary { background:#111827; color:#fff; } .secondary { background:#e5e7eb; color:#111827; }
      .card { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:15px; margin-bottom:16px; box-shadow:0 4px 14px rgba(15,23,42,.05); }
      .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(145px,1fr)); gap:12px; margin-bottom:16px; }
      .kpi { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:14px; }
      .kpi span { color:#6b7280; font-size:12px; font-weight:700; } .kpi strong { display:block; font-size:27px; margin-top:4px; }
      table { width:100%; border-collapse:collapse; font-size:13px; }
      th,td { text-align:left; border-bottom:1px solid #e5e7eb; padding:8px; vertical-align:top; }
      th { background:#f9fafb; color:#374151; }
      .pill { display:inline-block; border-radius:999px; padding:3px 8px; font-size:12px; font-weight:700; }
      .pass,.ready { background:#dcfce7; color:#166534; } .warn,.needs { background:#fef3c7; color:#92400e; } .fail,.blocked { background:#fee2e2; color:#991b1b; }
      pre { white-space:pre-wrap; background:#0f172a; color:#e5e7eb; border-radius:12px; padding:12px; max-height:260px; overflow:auto; }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="header">
        <div>
          <h1>Production Deployment Wizard</h1>
          <div class="muted">GA Phase 2 provisioning, validation, seeding, Drive setup, AI/automation readiness, and deployment reporting.</div>
        </div>
        <button class="secondary" onclick="loadDashboard()">Refresh</button>
      </div>

      <div class="toolbar">
        <div><label>Environment</label><br><select id="environment"><option>Production</option><option>Staging</option><option>Testing</option></select></div>
        <button class="primary" onclick="runDeployment()">Run Phase 2 Deployment</button>
      </div>

      <section class="kpis">
        <div class="kpi"><span>Runs</span><strong id="kRuns">0</strong></div>
        <div class="kpi"><span>Latest Status</span><strong id="kStatus">-</strong></div>
        <div class="kpi"><span>Score</span><strong id="kScore">0</strong></div>
        <div class="kpi"><span>Critical</span><strong id="kCritical">0</strong></div>
        <div class="kpi"><span>Warnings</span><strong id="kWarnings">0</strong></div>
      </section>

      <section class="card"><h2>Latest Deployment Checks</h2><table id="checksTable"></table></section>
      <section class="card"><h2>Deployment Runs</h2><table id="runsTable"></table></section>
      <section class="card"><h2>System Output</h2><pre id="output">Ready.</pre></section>
    </main>

    <script>
      function loadDashboard(){ google.script.run.withSuccessHandler(render).withFailureHandler(showError).reosDeploymentWizardDashboard(); }
      function runDeployment(){ google.script.run.withSuccessHandler(function(d){output(d);loadDashboard();}).withFailureHandler(showError).reosDeploymentWizardRun({environment:valueOf('environment')}); }
      function render(data){ const k=data.kpis||{}; setText('kRuns',k.runs); setText('kStatus',k.latestStatus); setText('kScore',k.latestScore); setText('kCritical',k.criticalIssues); setText('kWarnings',k.warnings); renderChecks(data.latestChecks||[]); renderRuns(data.runs||[]); output(data); }
      function renderChecks(rows){ let h='<tr><th>Step</th><th>Area</th><th>Status</th><th>Severity</th><th>Message</th></tr>'; if(!rows.length) h+='<tr><td colspan="5">No deployment checks yet.</td></tr>'; rows.forEach(r=>{h+='<tr><td>'+esc(r.Step)+'</td><td>'+esc(r.Area)+'</td><td><span class="pill '+esc(String(r.Status||'').toLowerCase())+'">'+esc(r.Status)+'</span></td><td>'+esc(r.Severity)+'</td><td>'+esc(r.Message)+'</td></tr>';}); document.getElementById('checksTable').innerHTML=h; }
      function renderRuns(rows){ let h='<tr><th>Started</th><th>Environment</th><th>Status</th><th>Score</th><th>Critical</th><th>Warnings</th></tr>'; if(!rows.length) h+='<tr><td colspan="6">No deployment runs yet.</td></tr>'; rows.forEach(r=>{h+='<tr><td>'+esc(r['Started At'])+'</td><td>'+esc(r.Environment)+'</td><td>'+esc(r.Status)+'</td><td>'+esc(r.Score)+'</td><td>'+esc(r['Critical Issues'])+'</td><td>'+esc(r.Warnings)+'</td></tr>';}); document.getElementById('runsTable').innerHTML=h; }
      function output(v){document.getElementById('output').textContent=typeof v==='string'?v:JSON.stringify(v,null,2);} function showError(e){output({error:e.message});}
      function valueOf(id){const el=document.getElementById(id); return el?el.value:'';} function setText(id,v){document.getElementById(id).textContent=v||0;} function esc(v){return String(v==null?'':v).replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));}
      loadDashboard();
    </script>
  </body>
</html>
