<!DOCTYPE html>
<html>
  <head><base target="_top"><meta charset="utf-8"><style>
    body{margin:0;font-family:Arial,sans-serif;background:#f6f8fb;color:#111827}.shell{padding:22px}.header{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:16px}h1{margin:0 0 6px;font-size:26px}h2{margin:0 0 10px;font-size:17px}.muted{color:#6b7280}.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:end;margin-bottom:16px}label{font-size:12px;font-weight:700;color:#374151}input,select,textarea{padding:9px;border:1px solid #d1d5db;border-radius:8px}textarea{min-height:58px}button{padding:9px 12px;border:0;border-radius:8px;cursor:pointer;font-weight:700}.primary{background:#111827;color:#fff}.secondary{background:#e5e7eb;color:#111827}.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:15px;margin-bottom:16px;box-shadow:0 4px 14px rgba(15,23,42,.05)}.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:12px;margin-bottom:16px}.kpi{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px}.kpi span{color:#6b7280;font-size:12px;font-weight:700}.kpi strong{display:block;font-size:24px;margin-top:4px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{text-align:left;border-bottom:1px solid #e5e7eb;padding:8px;vertical-align:top}th{background:#f9fafb;color:#374151}pre{white-space:pre-wrap;background:#0f172a;color:#e5e7eb;border-radius:12px;padding:12px;max-height:260px;overflow:auto}
  </style></head>
  <body><main class="shell">
    <div class="header"><div><h1>v3.2.4 Client / Lender Portal UI</h1><div class="muted">Property visibility, shared documents, updates, messages, tasks, and lender notes.</div></div><button class="secondary" onclick="loadDashboard()">Refresh</button></div>
    <div class="toolbar"><div><label>Portal Account ID</label><br><input id="accountId"></div><button class="primary" onclick="loadDashboard()">Load Portal</button></div>
    <section class="kpis"><div class="kpi"><span>Properties</span><strong id="kProperties">0</strong></div><div class="kpi"><span>Documents</span><strong id="kDocs">0</strong></div><div class="kpi"><span>Messages</span><strong id="kMessages">0</strong></div><div class="kpi"><span>Tasks</span><strong id="kTasks">0</strong></div><div class="kpi"><span>Updates</span><strong id="kUpdates">0</strong></div><div class="kpi"><span>Notes</span><strong id="kNotes">0</strong></div></section>
    <section class="grid"><div class="card"><h2>Create Update</h2><label>Audience</label><select id="audience" style="width:100%"><option>Client</option><option>Lender</option></select><label>Title</label><input id="title" style="width:100%"><label>Body</label><textarea id="body" style="width:100%"></textarea><button class="primary" onclick="createUpdate()">Create Draft Update</button></div><div class="card"><h2>Create Lender Note</h2><label>Property ID</label><input id="propertyId" style="width:100%"><label>Reference ID</label><input id="referenceId" style="width:100%"><label>Note</label><textarea id="note" style="width:100%"></textarea><button class="secondary" onclick="createNote()">Create Note</button></div></section>
    <section class="card"><h2>Properties</h2><table id="propertiesTable"></table></section>
    <section class="card"><h2>Documents</h2><table id="docsTable"></table></section>
    <section class="card"><h2>Updates</h2><table id="updatesTable"></table></section>
    <section class="card"><h2>Messages</h2><table id="messagesTable"></table></section>
    <section class="card"><h2>Tasks</h2><table id="tasksTable"></table></section>
    <section class="card"><h2>Notes</h2><table id="notesTable"></table></section>
    <section class="card"><h2>System Output</h2><pre id="output">Ready.</pre></section>
  </main><script>
    function loadDashboard(){const id=valueOf('accountId');if(!id){output('Enter a Client or Lender Portal Account ID.');return;}google.script.run.withSuccessHandler(render).withFailureHandler(showError).reosClientLenderPortalDashboard(id);}
    function createUpdate(){const r={'Portal Account ID':valueOf('accountId'),Audience:valueOf('audience'),Title:valueOf('title'),Body:valueOf('body'),Status:'Draft'};google.script.run.withSuccessHandler(done).withFailureHandler(showError).reosClientLenderPortalCreateUpdate(r);}
    function createNote(){const r={'Portal Account ID':valueOf('accountId'),'Property ID':valueOf('propertyId'),'Reference ID':valueOf('referenceId'),Note:valueOf('note')};google.script.run.withSuccessHandler(done).withFailureHandler(showError).reosClientLenderPortalCreateNote(r);}
    function done(d){output(d);loadDashboard();}
    function render(data){const k=data.kpis||{};setText('kProperties',k.properties);setText('kDocs',k.documents);setText('kMessages',k.openMessages);setText('kTasks',k.openTasks);setText('kUpdates',k.updates);setText('kNotes',k.notes);renderGeneric('propertiesTable',data.properties||[],['Property ID','Address','Status','Property Type']);renderGeneric('docsTable',data.documents||[],['Document ID','Property ID','Access Level','Status']);renderGeneric('updatesTable',data.updates||[],['Published At','Audience','Title','Status']);renderGeneric('messagesTable',data.messages||[],['Created At','Direction','Subject','Status']);renderGeneric('tasksTable',data.tasks||[],['Portal Task ID','Title','Status','Due Date']);renderGeneric('notesTable',data.notes||[],['Lender Note ID','Property ID','Reference ID','Status','Created At']);output(data);}
    function renderGeneric(id,rows,cols){let h='<tr>'+cols.map(c=>'<th>'+esc(c)+'</th>').join('')+'</tr>';if(!rows.length)h+='<tr><td colspan="'+cols.length+'">No records.</td></tr>';rows.forEach(r=>{h+='<tr>'+cols.map(c=>'<td>'+esc(r[c])+'</td>').join('')+'</tr>';});document.getElementById(id).innerHTML=h;}
    function output(v){document.getElementById('output').textContent=typeof v==='string'?v:JSON.stringify(v,null,2);}function showError(e){output({error:e.message});}function valueOf(id){const el=document.getElementById(id);return el?el.value:''}function setText(id,v){document.getElementById(id).textContent=v||0}function esc(v){return String(v==null?'':v).replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));}
  </script></body></html>
