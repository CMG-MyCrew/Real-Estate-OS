<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <style>
      body { margin:0; font-family:Arial,sans-serif; background:#f6f8fb; color:#1f2937; }
      .shell { padding:22px; }
      .header { display:flex; justify-content:space-between; gap:16px; align-items:flex-start; margin-bottom:16px; }
      h1 { margin:0 0 6px; font-size:26px; } h2 { margin:0 0 10px; font-size:17px; }
      .muted { color:#6b7280; }
      .toolbar { display:flex; flex-wrap:wrap; gap:8px; align-items:end; margin-bottom:16px; }
      label { font-size:12px; font-weight:700; color:#374151; }
      select { padding:9px; border:1px solid #d1d5db; border-radius:8px; }
      button { padding:9px 12px; border:0; border-radius:8px; cursor:pointer; font-weight:700; }
      .primary { background:#111827; color:#fff; } .secondary { background:#e5e7eb; color:#111827; }
      .card { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:15px; margin-bottom:16px; box-shadow:0 4px 14px rgba(15,23,42,.05); }
      .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(145px,1fr)); gap:12px; margin-bottom:16px; }
      .kpi { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:14px; }
      .kpi span { color:#6b7280; font-size:12px; font-weight:700; } .kpi strong { display:block; font-size:27px; margin-top:4px; }
      table { width:100%; border-collapse:collapse; font-size:13px; }
      th,td { text-align:left; border-bottom:1px solid #e5e7eb; padding:8px; vertical-align:top; }
      th { background:#f9fafb; color:#374151; }
      pre { white-space:pre-wrap; background:#0f172a; color:#e5e7eb; border-radius:12px; padding:12px; max-height:260px; overflow:auto; }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="header">
        <div>
          <h1>Enterprise Data Seeder</h1>
          <div class="muted">GA Phase 3 baseline seed for lookups, automation templates, AI agents, inspection templates, dashboard settings, and environment settings.</div>
        </div>
        <button class="secondary" onclick="loadDashboard()">Refresh</button>
      </div>

      <div class="toolbar">
        <div><label>Environment</label><br><select id="environment"><option>Production</option><option>Staging</option><option>Testing</option></select></div>
        <button class="primary" onclick="runSeed()">Run Enterprise Seed</button>
      </div>

      <section class="kpis">
        <div class="kpi"><span>Runs</span><strong id="kRuns">0</strong></div>
        <div class="kpi"><span>Latest Status</span><strong id="kStatus">-</strong></div>
        <div class="kpi"><span>Created</span><strong id="kCreated">0</strong></div>
        <div class="kpi"><span>Skipped</span><strong id="kSkipped">0</strong></div>
        <div class="kpi"><span>Failed</span><strong id="kFailed">0</strong></div>
      </section>

      <section class="card"><h2>Latest Seed Items</h2><table id="itemsTable"></table></section>
      <section class="card"><h2>Seed Runs</h2><table id="runsTable"></table></section>
      <section class="card"><h2>System Output</h2><pre id="output">Ready.</pre></section>
    </main>

    <script>
      function loadDashboard(){ google.script.run.withSuccessHandler(render).withFailureHandler(showError).reosEnterpriseSeederDashboard(); }
      function runSeed(){ google.script.run.withSuccessHandler(function(d){output(d);loadDashboard();}).withFailureHandler(showError).reosEnterpriseSeederRun({environment:valueOf('environment')}); }
      function render(data){ const k=data.kpis||{}; setText('kRuns',k.runs); setText('kStatus',k.latestStatus); setText('kCreated',k.created); setText('kSkipped',k.skipped); setText('kFailed',k.failed); renderItems(data.latestItems||[]); renderRuns(data.runs||[]); output(data); }
      function renderItems(rows){ let h='<tr><th>Area</th><th>Name</th><th>Status</th><th>Message</th></tr>'; if(!rows.length) h+='<tr><td colspan="4">No seed items yet.</td></tr>'; rows.forEach(r=>{h+='<tr><td>'+esc(r.Area)+'</td><td>'+esc(r.Name)+'</td><td>'+esc(r.Status)+'</td><td>'+esc(r.Message)+'</td></tr>';}); document.getElementById('itemsTable').innerHTML=h; }
      function renderRuns(rows){ let h='<tr><th>Started</th><th>Environment</th><th>Status</th><th>Created</th><th>Skipped</th><th>Failed</th></tr>'; if(!rows.length) h+='<tr><td colspan="6">No seed runs yet.</td></tr>'; rows.forEach(r=>{h+='<tr><td>'+esc(r['Started At'])+'</td><td>'+esc(r.Environment)+'</td><td>'+esc(r.Status)+'</td><td>'+esc(r['Items Created'])+'</td><td>'+esc(r['Items Skipped'])+'</td><td>'+esc(r['Items Failed'])+'</td></tr>';}); document.getElementById('runsTable').innerHTML=h; }
      function output(v){document.getElementById('output').textContent=typeof v==='string'?v:JSON.stringify(v,null,2);} function showError(e){output({error:e.message});}
      function valueOf(id){const el=document.getElementById(id); return el?el.value:'';} function setText(id,v){document.getElementById(id).textContent=v||0;} function esc(v){return String(v==null?'':v).replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));}
      loadDashboard();
    </script>
  </body>
</html>
