<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <style>
      body { margin:0; font-family:Arial,sans-serif; background:#f6f8fb; color:#1f2937; }
      .shell { padding:22px; }
      .header { display:flex; justify-content:space-between; gap:16px; align-items:flex-start; margin-bottom:16px; }
      h1 { margin:0 0 6px; font-size:26px; } h2 { margin:0 0 10px; font-size:17px; }
      .muted { color:#6b7280; }
      .toolbar { display:flex; flex-wrap:wrap; gap:8px; align-items:end; margin-bottom:16px; }
      button { padding:9px 12px; border:0; border-radius:8px; cursor:pointer; font-weight:700; }
      .primary { background:#111827; color:#fff; } .secondary { background:#e5e7eb; color:#111827; } .success { background:#dcfce7; color:#166534; }
      .card { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:15px; margin-bottom:16px; box-shadow:0 4px 14px rgba(15,23,42,.05); }
      .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(145px,1fr)); gap:12px; margin-bottom:16px; }
      .kpi { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:14px; }
      .kpi span { color:#6b7280; font-size:12px; font-weight:700; } .kpi strong { display:block; font-size:27px; margin-top:4px; }
      .grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
      table { width:100%; border-collapse:collapse; font-size:13px; }
      th,td { text-align:left; border-bottom:1px solid #e5e7eb; padding:8px; vertical-align:top; }
      th { background:#f9fafb; color:#374151; }
      pre { white-space:pre-wrap; background:#0f172a; color:#e5e7eb; border-radius:12px; padding:12px; max-height:260px; overflow:auto; }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="header">
        <div>
          <h1>AI Automation Agents</h1>
          <div class="muted">Cross-module AI orchestration, autonomous recommendations, agent runs, release summary, and task queues.</div>
        </div>
        <button class="secondary" onclick="loadDashboard()">Refresh</button>
      </div>

      <div class="toolbar">
        <button class="primary" onclick="seedAgents()">Seed Agents</button>
        <button class="success" onclick="runAll()">Run All Active</button>
        <button class="secondary" onclick="releaseSummary()">Release Summary</button>
      </div>

      <section class="kpis">
        <div class="kpi"><span>Agents</span><strong id="kAgents">0</strong></div>
        <div class="kpi"><span>Active</span><strong id="kActive">0</strong></div>
        <div class="kpi"><span>Runs</span><strong id="kRuns">0</strong></div>
        <div class="kpi"><span>Open Tasks</span><strong id="kTasks">0</strong></div>
        <div class="kpi"><span>Failed Runs</span><strong id="kFailed">0</strong></div>
      </section>

      <section class="grid">
        <div class="card"><h2>Agents</h2><table id="agentsTable"></table></div>
        <div class="card"><h2>Agent Tasks</h2><table id="tasksTable"></table></div>
      </section>
      <section class="card"><h2>Recent Runs</h2><table id="runsTable"></table></section>
      <section class="card"><h2>System Output</h2><pre id="output">Ready.</pre></section>
    </main>

    <script>
      function loadDashboard(){ google.script.run.withSuccessHandler(render).withFailureHandler(showError).reosAIAgentsDashboard(); }
      function seedAgents(){ google.script.run.withSuccessHandler(function(d){output(d);loadDashboard();}).withFailureHandler(showError).reosAIAgentsSeed(); }
      function runAll(){ google.script.run.withSuccessHandler(function(d){output(d);loadDashboard();}).withFailureHandler(showError).reosAIAgentsRunAll(); }
      function runAgent(id){ google.script.run.withSuccessHandler(function(d){output(d);loadDashboard();}).withFailureHandler(showError).reosAIAgentsRun(id, {}); }
      function releaseSummary(){ google.script.run.withSuccessHandler(output).withFailureHandler(showError).reosAIAgentsReleaseSummary(); }
      function completeTask(id){ google.script.run.withSuccessHandler(function(d){output(d);loadDashboard();}).withFailureHandler(showError).reosAIAgentsUpdateTask(id,{Status:'Completed'}); }
      function render(data){ const k=data.kpis||{}; setText('kAgents',k.agents); setText('kActive',k.activeAgents); setText('kRuns',k.runs); setText('kTasks',k.openAgentTasks); setText('kFailed',k.failedRuns); renderAgents(data.agents||[]); renderRuns(data.runs||[]); renderTasks(data.tasks||[]); output(data); }
      function renderAgents(rows){ let h='<tr><th>Name</th><th>Module</th><th>Type</th><th>Status</th><th>Goal</th><th>Action</th></tr>'; if(!rows.length) h+='<tr><td colspan="6">No agents found. Seed agents first.</td></tr>'; rows.forEach(r=>{h+='<tr><td>'+esc(r.Name)+'</td><td>'+esc(r.Module)+'</td><td>'+esc(r.Type)+'</td><td>'+esc(r.Status)+'</td><td>'+esc(r.Goal)+'</td><td><button class="secondary" onclick="runAgent(\''+escJs(r['Agent ID'])+'\')">Run</button></td></tr>';}); document.getElementById('agentsTable').innerHTML=h; }
      function renderRuns(rows){ let h='<tr><th>Started</th><th>Agent</th><th>Status</th><th>Error</th></tr>'; if(!rows.length) h+='<tr><td colspan="4">No runs yet.</td></tr>'; rows.forEach(r=>{h+='<tr><td>'+esc(r['Started At'])+'</td><td>'+esc(r['Agent Name'])+'</td><td>'+esc(r.Status)+'</td><td>'+esc(r.Error)+'</td></tr>';}); document.getElementById('runsTable').innerHTML=h; }
      function renderTasks(rows){ let h='<tr><th>Title</th><th>Module</th><th>Priority</th><th>Status</th><th>Action</th></tr>'; if(!rows.length) h+='<tr><td colspan="5">No agent tasks.</td></tr>'; rows.forEach(r=>{h+='<tr><td>'+esc(r.Title)+'</td><td>'+esc(r.Module)+'</td><td>'+esc(r.Priority)+'</td><td>'+esc(r.Status)+'</td><td><button class="secondary" onclick="completeTask(\''+escJs(r['Agent Task ID'])+'\')">Complete</button></td></tr>';}); document.getElementById('tasksTable').innerHTML=h; }
      function output(v){document.getElementById('output').textContent=typeof v==='string'?v:JSON.stringify(v,null,2);} function showError(e){output({error:e.message});}
      function setText(id,v){document.getElementById(id).textContent=v||0;} function esc(v){return String(v==null?'':v).replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));} function escJs(v){return String(v||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
      loadDashboard();
    </script>
  </body>
</html>
