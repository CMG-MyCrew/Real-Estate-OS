<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    :root { --bg:#f4f7fb; --panel:#fff; --text:#14213d; --muted:#64748b; --border:#dbe3ef; --primary:#1d4ed8; --danger:#b91c1c; --success:#047857; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Arial,sans-serif; background:var(--bg); color:var(--text); }
    header { padding:18px 22px; background:#0f172a; color:#fff; display:flex; justify-content:space-between; align-items:center; }
    header h1 { margin:0; font-size:22px; }
    header .sub { color:#cbd5e1; font-size:12px; margin-top:4px; }
    .actions { display:flex; gap:8px; flex-wrap:wrap; }
    button { border:0; border-radius:8px; padding:9px 12px; cursor:pointer; font-weight:600; }
    .primary { background:var(--primary); color:#fff; }
    .secondary { background:#e2e8f0; color:#0f172a; }
    .success { background:var(--success); color:#fff; }
    .danger { background:var(--danger); color:#fff; }
    main { padding:18px; }
    .kpis { display:grid; grid-template-columns:repeat(5,minmax(130px,1fr)); gap:12px; margin-bottom:16px; }
    .card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:14px; box-shadow:0 2px 6px rgba(15,23,42,.05); }
    .kpi-label { color:var(--muted); font-size:12px; }
    .kpi-value { font-size:24px; font-weight:700; margin-top:6px; }
    .filters { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
    select, input { border:1px solid var(--border); border-radius:8px; padding:8px; background:#fff; }
    table { width:100%; border-collapse:collapse; background:#fff; border-radius:12px; overflow:hidden; }
    th, td { padding:10px 8px; border-bottom:1px solid var(--border); text-align:left; font-size:12px; vertical-align:top; }
    th { background:#eef2ff; position:sticky; top:0; z-index:1; }
    .table-wrap { max-height:560px; overflow:auto; border:1px solid var(--border); border-radius:12px; }
    .pill { display:inline-block; border-radius:999px; padding:3px 8px; font-size:11px; background:#e2e8f0; }
    .pending { background:#fef3c7; color:#92400e; }
    .approved { background:#d1fae5; color:#065f46; }
    .rejected { background:#fee2e2; color:#991b1b; }
    .row-actions { display:flex; gap:5px; flex-wrap:wrap; }
    .row-actions button { padding:6px 8px; font-size:11px; }
    #message { margin-bottom:12px; min-height:20px; color:var(--muted); }
    @media (max-width:900px) { .kpis { grid-template-columns:repeat(2,1fr); } }
  </style>
</head>
<body>
<header>
  <div>
    <h1>AI Offer Review</h1>
    <div class="sub">Review, approve, reject, and publish acquisition offers</div>
  </div>
  <div class="actions">
    <button class="secondary" onclick="generateQueue()">Generate Queue</button>
    <button class="success" onclick="publishApproved()">Publish Approved</button>
    <button class="primary" onclick="refresh()">Refresh</button>
  </div>
</header>
<main>
  <div id="message">Loading...</div>
  <section class="kpis">
    <div class="card"><div class="kpi-label">Total</div><div class="kpi-value" id="kTotal">0</div></div>
    <div class="card"><div class="kpi-label">Pending</div><div class="kpi-value" id="kPending">0</div></div>
    <div class="card"><div class="kpi-label">Approved</div><div class="kpi-value" id="kApproved">0</div></div>
    <div class="card"><div class="kpi-label">Rejected</div><div class="kpi-value" id="kRejected">0</div></div>
    <div class="card"><div class="kpi-label">Published</div><div class="kpi-value" id="kPublished">0</div></div>
  </section>

  <div class="filters">
    <select id="statusFilter" onchange="refresh()"><option value="">All statuses</option></select>
    <select id="riskFilter" onchange="refresh()"><option value="">All risks</option></select>
    <select id="strategyFilter" onchange="refresh()"><option value="">All strategies</option></select>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>Address</th><th>Strategy</th><th>Offer</th><th>Profit</th><th>ROI</th>
        <th>Risk</th><th>Confidence</th><th>Status</th><th>Reviewer</th><th>Actions</th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</main>
<script>
  let bootstrapped = false;

  function call(name, args, onSuccess) {
    const runner = google.script.run
      .withSuccessHandler(onSuccess)
      .withFailureHandler(err => setMessage(err && err.message ? err.message : String(err), true));
    runner[name].apply(runner, args || []);
  }

  function setMessage(text, isError) {
    const el = document.getElementById('message');
    el.textContent = text || '';
    el.style.color = isError ? '#b91c1c' : '#64748b';
  }

  function money(v) { return '$' + Number(v || 0).toLocaleString(); }
  function esc(v) { return String(v == null ? '' : v).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c])); }

  function bootstrap() {
    call('reosOfferReviewDashboardBootstrap', [], data => {
      fill('statusFilter', data.filters.statuses || []);
      fill('riskFilter', data.filters.risks || []);
      fill('strategyFilter', data.filters.strategies || []);
      bootstrapped = true;
      refresh();
    });
  }

  function fill(id, values) {
    const select = document.getElementById(id);
    values.forEach(v => {
      const option = document.createElement('option');
      option.value = v; option.textContent = v; select.appendChild(option);
    });
  }

  function currentFilters() {
    return {
      status: document.getElementById('statusFilter').value,
      risk: document.getElementById('riskFilter').value,
      strategy: document.getElementById('strategyFilter').value
    };
  }

  function refresh() {
    if (!bootstrapped) return;
    setMessage('Refreshing...');
    call('reosOfferReviewDashboardRefresh', [currentFilters()], render);
  }

  function render(data) {
    const s = data.summary || {};
    document.getElementById('kTotal').textContent = s.total || 0;
    document.getElementById('kPending').textContent = s.pending || 0;
    document.getElementById('kApproved').textContent = s.approved || 0;
    document.getElementById('kRejected').textContent = s.rejected || 0;
    document.getElementById('kPublished').textContent = s.published || 0;

    const tbody = document.getElementById('rows');
    tbody.innerHTML = '';
    (data.records || []).forEach(r => {
      const tr = document.createElement('tr');
      const status = r['Review Status'] || '';
      const css = status === 'Approved' ? 'approved' : status === 'Rejected' ? 'rejected' : 'pending';
      const published = !!r['Published Offer ID'];
      tr.innerHTML = `
        <td><strong>${esc(r.Address)}</strong><br><span class="kpi-label">${esc(r['Lead ID'])}</span></td>
        <td>${esc(r.Strategy)}</td>
        <td>${money(r['Recommended Offer'])}</td>
        <td>${money(r['Projected Profit'])}</td>
        <td>${Number(r['Projected ROI %'] || 0).toFixed(1)}%</td>
        <td>${esc(r['Risk Level'])}</td>
        <td>${esc(r.Confidence)}</td>
        <td><span class="pill ${css}">${esc(status)}</span>${published ? '<br><span class="kpi-label">Published</span>' : ''}</td>
        <td>${esc(r.Reviewer)}</td>
        <td><div class="row-actions">
          ${status === 'Pending Review' ? `<button class="success" onclick="approve('${esc(r['Review ID'])}')">Approve</button><button class="danger" onclick="rejectReview('${esc(r['Review ID'])}')">Reject</button>` : ''}
        </div></td>`;
      tbody.appendChild(tr);
    });
    setMessage((data.records || []).length + ' review records loaded.');
  }

  function generateQueue() {
    setMessage('Generating review queue...');
    call('reosOfferReviewDashboardGenerate', [{}], result => {
      setMessage('Created ' + (result.created || 0) + ' review records.');
      refresh();
    });
  }

  function approve(id) {
    const notes = prompt('Approval notes:', 'Approved from dashboard.');
    if (notes === null) return;
    call('reosOfferReviewDashboardApprove', [id, notes], () => refresh());
  }

  function rejectReview(id) {
    const notes = prompt('Reason for rejection:', 'Rejected from dashboard.');
    if (notes === null) return;
    call('reosOfferReviewDashboardReject', [id, notes], () => refresh());
  }

  function publishApproved() {
    if (!confirm('Publish all approved, unpublished offers to OFFERS?')) return;
    setMessage('Publishing approved offers...');
    call('reosOfferReviewDashboardPublishApproved', [], result => {
      setMessage('Published ' + (result.published || 0) + ' offers.');
      refresh();
    });
  }

  bootstrap();
</script>
</body>
</html>
