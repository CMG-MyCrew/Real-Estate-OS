<!DOCTYPE html>
<html>
  <head>
    <base target="_top"><meta charset="utf-8">
    <style>
      body{margin:0;font-family:Arial,sans-serif;background:#f6f8fb;color:#1f2937}.shell{padding:22px}.header{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:16px}h1{margin:0 0 6px;font-size:26px}h2{margin:0 0 10px;font-size:17px}.muted{color:#6b7280}.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:end;margin-bottom:16px}label{font-size:12px;font-weight:700;color:#374151}input,select{padding:9px;border:1px solid #d1d5db;border-radius:8px}button{padding:9px 12px;border:0;border-radius:8px;cursor:pointer;font-weight:700}.primary{background:#111827;color:#fff}.secondary{background:#e5e7eb;color:#111827}.danger{background:#fee2e2;color:#991b1b}.success{background:#dcfce7;color:#166534}.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:15px;margin-bottom:16px;box-shadow:0 4px 14px rgba(15,23,42,.05)}.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:12px;margin-bottom:16px}.kpi{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px}.kpi span{color:#6b7280;font-size:12px;font-weight:700}.kpi strong{display:block;font-size:27px;margin-top:4px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{text-align:left;border-bottom:1px solid #e5e7eb;padding:8px;vertical-align:top}th{background:#f9fafb;color:#374151}pre{white-space:pre-wrap;background:#0f172a;color:#e5e7eb;border-radius:12px;padding:12px;max-height:260px;overflow:auto}
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="header"><div><h1>Production Launch & Sign-Off</h1><div class="muted">GA Phase 7 final launch checklist, approval workflow, go/no-go decision, GA publish record, and post-launch verification.</div></div><button class="secondary" onclick="loadDashboard()">Refresh</button></div>
      <div class="toolbar"><div><label>Version</label><br><input id="version" value="3.0.0"></div><div><label>Environment</label><br><select id="environment"><option>Production</option><option>Staging</option><option>Testing</option></select></div><button class="primary" onclick="createLaunch()">Create Launch</button><button class="success" onclick="publishLatest()">Publish GA</button></div>
      <section class="kpis"><div class="kpi"><span>Launches</span><strong id="kLaunches">0</strong></div><div class="kpi"><span>Status</span><strong id="kStatus">-</strong></div><div class="kpi"><span>Decision</span><strong id="kDecision">-</strong></div><div class="kpi"><span>Score</span><strong id="kScore">0</strong></div><div class="kpi"><span>Critical</span><strong id="kCritical">0</strong></div><div class="kpi"><span>Warnings</span><strong id="kWarnings">0</strong></div></section>
      <section class="card"><h2>Sign-Offs</h2><table id="signoffsTable"></table></section>
      <section class="card"><h2>Launch Checks</h2><table id="checksTable"></table></section>
      <section class="card"><h2>Launches</h2><table id="launchesTable"></table></section>
      <section class="card"><h2>System Output</h2><pre id="output">Ready.</pre></section>
    </main>
    <script>
      let latestLaunchId='';
      function loadDashboard(){ google.script.run.withSuccessHandler(render).withFailureHandler(showError).reosProductionLaunchDashboard(); }
      function createLaunch(){ google.script.run.withSuccessHandler(function(d){output(d);loadDashboard();}).withFailureHandler(showError).reosProductionLaunchCreate({version:valueOf('version'),environment:valueOf('environment')}); }
      function approve(role){ google.script.run.withSuccessHandler(function(d){output(d);loadDashboard();}).withFailureHandler(showError).reosProductionLaunchApprove(latestLaunchId,role,'Approved from launch UI.'); }
      function reject(role){ google.script.run.withSuccessHandler(function(d){output(d);loadDashboard();}).withFailureHandler(showError).reosProductionLaunchReject(latestLaunchId,role,'Rejected from launch UI.'); }
      function publishLatest(){ google.script.run.withSuccessHandler(function(d){output(d);loadDashboard();}).withFailureHandler(showError).reosProductionLaunchPublish(latestLaunchId); }
      function render(data){ const k=data.kpis||{}; latestLaunchId=(data.launches&&data.launches[0])?data.launches[0]['Launch ID']:''; setText('kLaunches',k.launches); setText('kStatus',k.latestStatus); setText('kDecision',k.latestDecision); setText('kScore',k.latestScore); setText('kCritical',k.criticalIssues); setText('kWarnings',k.warnings); renderSignoffs(data.latestSignoffs||[]); renderChecks(data.latestChecks||[]); renderLaunches(data.launches||[]); output(data); }
      function renderSignoffs(rows){ let h='<tr><th>Role</th><th>Approver</th><th>Status</th><th>Signed</th><th>Actions</th></tr>'; if(!rows.length)h+='<tr><td colspan="5">No sign-offs yet.</td></tr>'; rows.forEach(r=>{h+='<tr><td>'+esc(r.Role)+'</td><td>'+esc(r.Approver)+'</td><td>'+esc(r.Status)+'</td><td>'+esc(r['Signed At'])+'</td><td><button class="success" onclick="approve(\''+escJs(r.Role)+'\')">Approve</button> <button class="danger" onclick="reject(\''+escJs(r.Role)+'\')">Reject</button></td></tr>';}); document.getElementById('signoffsTable').innerHTML=h; }
      function renderChecks(rows){ let h='<tr><th>Area</th><th>Check</th><th>Status</th><th>Severity</th><th>Message</th></tr>'; if(!rows.length)h+='<tr><td colspan="5">No launch checks yet.</td></tr>'; rows.forEach(r=>{h+='<tr><td>'+esc(r.Area)+'</td><td>'+esc(r.Check)+'</td><td>'+esc(r.Status)+'</td><td>'+esc(r.Severity)+'</td><td>'+esc(r.Message)+'</td></tr>';}); document.getElementById('checksTable').innerHTML=h; }
      function renderLaunches(rows){ let h='<tr><th>Created</th><th>Version</th><th>Environment</th><th>Status</th><th>Decision</th><th>Score</th></tr>'; if(!rows.length)h+='<tr><td colspan="6">No launches yet.</td></tr>'; rows.forEach(r=>{h+='<tr><td>'+esc(r['Created At'])+'</td><td>'+esc(r.Version)+'</td><td>'+esc(r.Environment)+'</td><td>'+esc(r.Status)+'</td><td>'+esc(r.Decision)+'</td><td>'+esc(r.Score)+'</td></tr>';}); document.getElementById('launchesTable').innerHTML=h; }
      function output(v){document.getElementById('output').textContent=typeof v==='string'?v:JSON.stringify(v,null,2);} function showError(e){output({error:e.message});}
      function valueOf(id){const el=document.getElementById(id);return el?el.value:''} function setText(id,v){document.getElementById(id).textContent=v||0} function esc(v){return String(v==null?'':v).replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));} function escJs(v){return String(v||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
      loadDashboard();
    </script>
  </body>
</html>
