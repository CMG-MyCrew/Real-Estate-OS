<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <?!= include('styles'); ?>
    <style>
      .wrap { padding: 18px; }
      .grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 16px; margin-top: 16px; }
      .card { background: #fff; border: 1px solid #d8dee9; border-radius: 12px; padding: 14px; }
      .kpis { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 14px; }
      .kpi { background: #fff; border: 1px solid #d8dee9; border-radius: 12px; padding: 12px; }
      .kpi .label { font-size: 11px; color: #68778d; }
      .kpi .value { font-size: 18px; font-weight: 700; margin-top: 6px; }
      input, select, textarea { width: 100%; box-sizing: border-box; padding: 9px; margin: 5px 0 10px; border: 1px solid #cfd8e3; border-radius: 8px; }
      label { font-size: 12px; font-weight: 700; color: #405064; }
      table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
      th, td { border-bottom: 1px solid #e4e8f0; padding: 8px; text-align: left; }
      .tabs { display: flex; gap: 8px; margin-top: 12px; }
      .muted { color: #68778d; font-size: 12px; }
      .status { margin-top: 10px; font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h2>Rentals</h2>
      <div class="muted">Rental portfolio, leases, and maintenance operations.</div>

      <div class="kpis">
        <div class="kpi"><div class="label">Rentals</div><div id="rentalCount" class="value">0</div></div>
        <div class="kpi"><div class="label">Occupied</div><div id="occupiedCount" class="value">0</div></div>
        <div class="kpi"><div class="label">Vacant</div><div id="vacantCount" class="value">0</div></div>
        <div class="kpi"><div class="label">Occupancy</div><div id="occupancyRate" class="value">0%</div></div>
        <div class="kpi"><div class="label">Cash Flow</div><div id="cashFlow" class="value">$0</div></div>
      </div>

      <div class="grid">
        <div class="card">
          <h3>New Rental</h3>
          <label>Property ID</label><input id="propertyId" placeholder="P-...">
          <label>Address</label><input id="address" placeholder="123 Main St">
          <label>Occupancy Status</label><select id="occupancy"><option>Vacant</option><option>Occupied</option></select>
          <label>Monthly Rent</label><input id="rent" type="number" min="0" step="100">
          <label>Mortgage</label><input id="mortgage" type="number" min="0" step="100">
          <label>Taxes</label><input id="taxes" type="number" min="0" step="10">
          <label>Insurance</label><input id="insurance" type="number" min="0" step="10">
          <label>HOA</label><input id="hoa" type="number" min="0" step="10">
          <label>Maintenance Reserve</label><input id="maintenanceReserve" type="number" min="0" step="10">
          <label>Vacancy Reserve</label><input id="vacancyReserve" type="number" min="0" step="10">
          <label>Other Expenses</label><input id="otherExpenses" type="number" min="0" step="10">
          <label>Notes</label><textarea id="notes" rows="3"></textarea>
          <button onclick="createRental()">Create Rental</button>
          <div id="createStatus" class="status"></div>
        </div>

        <div class="card">
          <h3>Portfolio</h3>
          <button onclick="loadDashboard()">Refresh</button>
          <table>
            <thead><tr><th>Address</th><th>Occupancy</th><th>Rent</th><th>Expenses</th><th>Cash Flow</th></tr></thead>
            <tbody id="rentals"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      function money(value) { return '$' + Number(value || 0).toLocaleString(undefined, { maximumFractionDigits: 0 }); }
      function pct(value) { return (Number(value || 0) * 100).toFixed(1) + '%'; }
      function escapeHtml(value) { return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;'); }
      function setText(id, text) { document.getElementById(id).textContent = text || ''; }
      function createRental() {
        const rental = {
          'Property ID': document.getElementById('propertyId').value,
          Address: document.getElementById('address').value,
          'Occupancy Status': document.getElementById('occupancy').value,
          'Monthly Rent': Number(document.getElementById('rent').value || 0),
          Mortgage: Number(document.getElementById('mortgage').value || 0),
          Taxes: Number(document.getElementById('taxes').value || 0),
          Insurance: Number(document.getElementById('insurance').value || 0),
          HOA: Number(document.getElementById('hoa').value || 0),
          'Maintenance Reserve': Number(document.getElementById('maintenanceReserve').value || 0),
          'Vacancy Reserve': Number(document.getElementById('vacancyReserve').value || 0),
          'Other Expenses': Number(document.getElementById('otherExpenses').value || 0),
          Notes: document.getElementById('notes').value
        };
        setText('createStatus', 'Creating...');
        google.script.run.withSuccessHandler(function () {
          setText('createStatus', 'Rental created.');
          loadDashboard();
        }).withFailureHandler(function (err) { setText('createStatus', 'Error: ' + err.message); }).rentalsCreate(rental);
      }
      function loadDashboard() {
        google.script.run.withSuccessHandler(renderDashboard).withFailureHandler(function (err) { alert(err.message); }).rentalsDashboard();
      }
      function renderDashboard(data) {
        setText('rentalCount', data.rentalCount);
        setText('occupiedCount', data.occupiedCount);
        setText('vacantCount', data.vacantCount);
        setText('occupancyRate', pct(data.occupancyRate));
        setText('cashFlow', money(data.monthlyCashFlow));
        const tbody = document.getElementById('rentals');
        tbody.innerHTML = '';
        (data.active || []).forEach(function (r) {
          const tr = document.createElement('tr');
          tr.innerHTML = '<td>' + escapeHtml(r.Address) + '</td><td>' + escapeHtml(r['Occupancy Status']) + '</td><td>' + money(r['Monthly Rent']) + '</td><td>' + money(r['Total Monthly Expenses']) + '</td><td>' + money(r['Net Monthly Cash Flow']) + '</td>';
          tbody.appendChild(tr);
        });
      }
      loadDashboard();
    </script>
  </body>
</html>
