<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <?!= include('styles'); ?>
    <style>
      .wrap { padding: 18px; }
      .grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 16px; margin-top: 16px; }
      .card { background: #fff; border: 1px solid #d8dee9; border-radius: 12px; padding: 14px; }
      .kpis { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 14px; }
      .kpi { background: #fff; border: 1px solid #d8dee9; border-radius: 12px; padding: 12px; }
      .kpi .label { font-size: 11px; color: #68778d; }
      .kpi .value { font-size: 18px; font-weight: 700; margin-top: 6px; }
      input, select, textarea { width: 100%; box-sizing: border-box; padding: 9px; margin: 5px 0 10px; border: 1px solid #cfd8e3; border-radius: 8px; }
      label { font-size: 12px; font-weight: 700; color: #405064; }
      table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
      th, td { border-bottom: 1px solid #e4e8f0; padding: 8px; text-align: left; }
      .muted { color: #68778d; font-size: 12px; }
      .status { margin-top: 10px; font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h2>Finance</h2>
      <div class="muted">Income, expenses, tax reserve, and cash-flow view.</div>

      <div class="kpis">
        <div class="kpi"><div class="label">Monthly Income</div><div id="income" class="value">$0</div></div>
        <div class="kpi"><div class="label">Monthly Expenses</div><div id="expenses" class="value">$0</div></div>
        <div class="kpi"><div class="label">Net Profit</div><div id="profit" class="value">$0</div></div>
        <div class="kpi"><div class="label">Tax Reserve</div><div id="taxReserve" class="value">$0</div></div>
        <div class="kpi"><div class="label">Cash Flow</div><div id="cashFlow" class="value">$0</div></div>
      </div>

      <div class="grid">
        <div class="card">
          <h3>New Entry</h3>
          <label>Date</label><input id="date" type="date">
          <label>Type</label><select id="type"><option>Income</option><option>Expense</option></select>
          <label>Category</label><input id="category" placeholder="Commission Income, Marketing, Repairs...">
          <label>Subcategory</label><input id="subcategory" placeholder="Optional">
          <label>Amount</label><input id="amount" type="number" min="0" step="0.01">
          <label>Record Type</label><input id="recordType" placeholder="Transaction, Rental, Investment...">
          <label>Record ID</label><input id="recordId" placeholder="Optional">
          <label>Payment Status</label><select id="paymentStatus"><option>Paid</option><option>Pending</option><option>Projected</option></select>
          <label>Tax Reserve Rate</label><input id="taxRate" type="number" min="0" step="0.01" value="0.30">
          <label>Notes</label><textarea id="notes" rows="3"></textarea>
          <button onclick="createEntry()">Create Entry</button>
          <div id="createStatus" class="status"></div>
        </div>

        <div class="card">
          <h3>Recent Entries</h3>
          <button onclick="loadDashboard()">Refresh</button>
          <table>
            <thead><tr><th>Date</th><th>Type</th><th>Category</th><th>Amount</th></tr></thead>
            <tbody id="entries"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      function money(value) { return '$' + Number(value || 0).toLocaleString(undefined, { maximumFractionDigits: 0 }); }
      function escapeHtml(value) { return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;'); }
      function setText(id, text) { document.getElementById(id).textContent = text || ''; }
      function createEntry() {
        const entry = {
          Date: document.getElementById('date').value,
          Type: document.getElementById('type').value,
          Category: document.getElementById('category').value,
          Subcategory: document.getElementById('subcategory').value,
          Amount: Number(document.getElementById('amount').value || 0),
          'Record Type': document.getElementById('recordType').value,
          'Record ID': document.getElementById('recordId').value,
          'Payment Status': document.getElementById('paymentStatus').value,
          'Tax Reserve Rate': Number(document.getElementById('taxRate').value || 0.30),
          Notes: document.getElementById('notes').value
        };
        setText('createStatus', 'Creating...');
        google.script.run.withSuccessHandler(function () {
          setText('createStatus', 'Entry created.');
          loadDashboard();
        }).withFailureHandler(function (err) { setText('createStatus', 'Error: ' + err.message); }).financeCreate(entry);
      }
      function loadDashboard() {
        google.script.run.withSuccessHandler(renderDashboard).withFailureHandler(function (err) { alert(err.message); }).financeDashboard();
      }
      function renderDashboard(data) {
        const current = data.currentMonth || {};
        setText('income', money(current.income));
        setText('expenses', money(current.expenses));
        setText('profit', money(current.netProfit));
        setText('taxReserve', money(current.taxReserve));
        setText('cashFlow', money(current.cashFlow));
        const tbody = document.getElementById('entries');
        tbody.innerHTML = '';
        (data.recent || []).forEach(function (e) {
          const tr = document.createElement('tr');
          tr.innerHTML = '<td>' + escapeHtml(e.Date) + '</td><td>' + escapeHtml(e.Type) + '</td><td>' + escapeHtml(e.Category) + '</td><td>' + money(e.Amount) + '</td>';
          tbody.appendChild(tr);
        });
      }
      loadDashboard();
    </script>
  </body>
</html>
