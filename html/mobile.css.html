<style>
  :root {
    --bg: #f6f8fb;
    --panel: #ffffff;
    --border: #d8dee9;
    --text: #172033;
    --muted: #68778d;
    --brand: #0f2742;
    --danger: #a61b1b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); font-family: Arial, sans-serif; }
  .app-shell { min-height: 100vh; padding-bottom: 74px; }
  .topbar {
    position: sticky; top: 0; z-index: 10;
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
    padding: calc(12px + env(safe-area-inset-top)) 14px 12px;
    background: var(--brand); color: #fff;
    box-shadow: 0 2px 10px rgba(0,0,0,.12);
  }
  .brand { font-weight: 800; font-size: 18px; letter-spacing: .5px; }
  .subtitle { font-size: 12px; opacity: .85; }
  .content { padding: 14px; }
  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
    padding: 14px; margin-bottom: 14px;
    box-shadow: 0 1px 3px rgba(15,39,66,.04);
  }
  h3 { margin: 0 0 10px; font-size: 16px; }
  .kpis { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 14px; }
  .kpi { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 12px; }
  .kpi span { display: block; color: var(--muted); font-size: 11px; margin-bottom: 6px; }
  .kpi strong { font-size: 18px; }
  .list { display: grid; gap: 8px; }
  .item { display: flex; justify-content: space-between; align-items: center; gap: 10px; border-bottom: 1px solid #edf1f6; padding: 8px 0; }
  .item:last-child { border-bottom: 0; }
  .muted { color: var(--muted); font-size: 12px; }
  .error { color: var(--danger); white-space: pre-wrap; }
  button {
    border: 0; border-radius: 12px; padding: 10px 12px;
    background: var(--brand); color: #fff; font-weight: 700;
  }
  .topbar button { background: rgba(255,255,255,.16); }
  .quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  textarea, input, select {
    width: 100%; border: 1px solid var(--border); border-radius: 12px;
    padding: 10px; font-size: 16px; margin-bottom: 10px;
  }
  .response { white-space: pre-wrap; background: #f1f4f8; border-radius: 12px; padding: 12px; overflow: auto; }
  .bottom-nav {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 20;
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px;
    padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
    background: #fff; border-top: 1px solid var(--border);
  }
  .bottom-nav button { padding: 9px 4px; font-size: 11px; border-radius: 10px; }
  @media (min-width: 760px) {
    .content { max-width: 900px; margin: 0 auto; }
    .kpis { grid-template-columns: repeat(4, 1fr); }
  }
</style>
